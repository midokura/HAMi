---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hami-amd-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hami-amd-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: hami-amd-device-plugin
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hami-amd-device-plugin
  namespace: kube-system
  labels:
    app: hami-amd-device-plugin
spec:
  selector:
    matchLabels:
      app: hami-amd-device-plugin
  template:
    metadata:
      labels:
        app: hami-amd-device-plugin
    spec:
      serviceAccountName: hami-amd-device-plugin
      hostNetwork: true
      nodeSelector:
        gpu: "on"
      containers:
        - name: device-plugin
          image: hami-amd-device-plugin:latest
          imagePullPolicy: IfNotPresent
          args:
            - --resource-name=amd.com/gpu
            - --device-count=10
            - --log-level=3
            - --v=4
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LD_LIBRARY_PATH
              value: /opt/rocm/lib:/opt/amdgpu/lib/x86_64-linux-gnu
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev-kfd
              mountPath: /dev/kfd
            - name: dev-dri
              mountPath: /dev/dri
            - name: libamvgpu
              mountPath: /opt/hami/libamvgpu.so
              readOnly: true
            - name: rocm
              mountPath: /opt/rocm
              readOnly: true
            - name: rocminfo
              mountPath: /usr/bin/rocminfo
              readOnly: true
      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev-kfd
          hostPath:
            path: /dev/kfd
        - name: dev-dri
          hostPath:
            path: /dev/dri
        - name: libamvgpu
          hostPath:
            path: /opt/hami/libamvgpu.so
            type: File
        - name: rocm
          hostPath:
            path: /opt/rocm
            type: Directory
        - name: rocminfo
          hostPath:
            path: /usr/bin/rocminfo
            type: File
