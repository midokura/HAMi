---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hami-device-config
  namespace: kube-system
data:
  device-config.yaml: |
    amd:
      resourceCountName: "amd.com/gpu"
      resourceMemoryName: "amd.com/gpumem"
      resourceCoreName: "amd.com/gpucores"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hami-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hami-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: hami-scheduler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-scheduler
  namespace: kube-system
  labels:
    app: hami-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hami-scheduler
  template:
    metadata:
      labels:
        app: hami-scheduler
    spec:
      serviceAccountName: hami-scheduler
      hostNetwork: true
      containers:
        - name: scheduler
          image: hami-scheduler:latest
          imagePullPolicy: Never
          args:
            - --http_bind=0.0.0.0:8080
            - --device-config-file=/config/device-config.yaml
            - --v=4
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9395
              name: metrics
          volumeMounts:
            - name: device-config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: device-config
          configMap:
            name: hami-device-config
---
apiVersion: v1
kind: Service
metadata:
  name: hami-scheduler
  namespace: kube-system
spec:
  selector:
    app: hami-scheduler
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9395
      targetPort: 9395
